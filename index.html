<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="A simple income and expense tracker with USD and Saudi Riyal support.">
  <title>MoneyTrack</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Personal ledger</p>
      <h1>MoneyTrack</h1>
    </div>
    <button class="icon-button" id="install-button" type="button" hidden aria-label="Install app" title="Install app">
      <span aria-hidden="true">+</span>
    </button>
  </header>

  <main class="app-shell">
    <section class="summary-panel" aria-label="Account summary">
      <div class="summary-top">
        <div>
          <p class="muted">Balance</p>
          <strong id="balance-total">$0.00</strong>
        </div>
        <label class="select-label">
          Display
          <select id="display-currency">
            <option value="USD">USD</option>
            <option value="SAR">SR</option>
          </select>
        </label>
      </div>

      <div class="summary-grid">
        <div>
          <span>Income</span>
          <strong id="income-total">$0.00</strong>
        </div>
        <div>
          <span>Expenses</span>
          <strong id="expense-total">$0.00</strong>
        </div>
        <div>
          <span>This month</span>
          <strong id="month-total">$0.00</strong>
        </div>
      </div>
      <p class="rate-note">Conversion rate: $1 = 3.75 SR</p>
    </section>

    <section class="entry-panel" aria-labelledby="entry-title">
      <div class="section-title">
        <h2 id="entry-title">Add transaction</h2>
        <button class="ghost-button" id="clear-form" type="button">Clear</button>
      </div>

      <form id="transaction-form">
        <div class="segmented" role="radiogroup" aria-label="Transaction type">
          <label>
            <input type="radio" name="type" value="income" checked>
            <span>Income</span>
          </label>
          <label>
            <input type="radio" name="type" value="expense">
            <span>Expense</span>
          </label>
        </div>

        <div class="form-grid">
          <label>
            Amount
            <input id="amount" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" required>
          </label>
          <label>
            Currency
            <select id="currency">
              <option value="USD">USD</option>
              <option value="SAR">SR</option>
            </select>
          </label>
          <label>
            Category
            <select id="category" required></select>
          </label>
          <label>
            Date
            <input id="date" type="date" required>
          </label>
        </div>

        <label>
          Note
          <input id="note" type="text" maxlength="80" placeholder="Salary, groceries, coffee...">
        </label>

        <button class="primary-button" type="submit">Save transaction</button>
      </form>
    </section>

    <section class="reports-panel" aria-labelledby="reports-title">
      <div class="section-title">
        <h2 id="reports-title">Reports</h2>
        <div class="toolbar">
          <select id="report-range" aria-label="Report range">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly" selected>Monthly</option>
          </select>
          <button class="ghost-button" id="export-csv" type="button">CSV</button>
        </div>
      </div>

      <div class="report-metrics">
        <div>
          <span>Income</span>
          <strong id="report-income">$0.00</strong>
        </div>
        <div>
          <span>Expenses</span>
          <strong id="report-expense">$0.00</strong>
        </div>
        <div>
          <span>Net</span>
          <strong id="report-net">$0.00</strong>
        </div>
      </div>

      <div class="chart-wrap" aria-label="Expense by category">
        <div id="category-bars"></div>
      </div>
    </section>

    <section class="history-panel" aria-labelledby="history-title">
      <div class="section-title">
        <h2 id="history-title">Recent activity</h2>
        <button class="danger-button" id="clear-all" type="button">Reset</button>
      </div>
      <div id="transaction-list" class="transaction-list"></div>
      <p id="empty-state" class="empty-state">No transactions yet. Add your first income or expense above.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
